@if (empty) {
  <div class="player-card player-card--empty">
    <div class="empty-avatar"></div>
    <div class="player-info">
      <span class="empty-label">?</span>
    </div>
  </div>
} @else {
  <div class="player-card">
    <img [src]="avatarPath" [alt]="alias" class="player-avatar" />

    <div class="player-info">
      <div class="player-name-row">
        @if (isHost) {
          <img src="app-icons/promptle-crown.svg" alt="Host" class="crown" />
        }
        <span class="player-alias">{{ alias }}</span>
        @if (isCurrentPlayer) {
          <span class="me-badge">ME</span>
        }
      </div>
    </div>

    @if (showKickButton) {
      <button type="button" class="kick-btn" aria-label="Kick player">
        <img src="app-icons/promptle-leave.svg" class="btn-icon" alt="" />
      </button>
    }
  </div>
}
