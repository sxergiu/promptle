<div class="player-card">
  <img [src]="avatarPath" [alt]="alias" class="player-avatar" />

  <div class="player-info">
    <span class="player-alias">{{ alias }}</span>
    @if (isHost) {
      <span class="crown" aria-label="Host crown">&#x1F451;</span>
    }
    @if (isCurrentPlayer) {
      <span class="me-label">me</span>
    }
  </div>

  @if (showKickButton) {
    <button type="button" class="kick-btn" aria-label="Kick player">Kick</button>
  }
</div>
