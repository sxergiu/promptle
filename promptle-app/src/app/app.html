<img
  [src]="theme.theme() === 'dark' ? 'app-icons/promptle-sun.svg' : 'app-icons/promptle-moon.svg'"
  class="theme-toggle"
  (click)="theme.toggle()"
  [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
  role="button"
  tabindex="0"
  (keydown.enter)="theme.toggle()"
  (keydown.space)="theme.toggle()"
/>

<router-outlet />
