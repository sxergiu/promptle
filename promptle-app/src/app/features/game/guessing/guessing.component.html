
    <div class="phase-card">
      <p class="phase-title">Can you deduct the meaning of this image?</p>
      <p class="phase-hint">Figure out what the prompter had in mind.</p>
      <div class="image-frame">
        @if (imageUrl) {
          <img [src]="imageUrl" alt="Generated image" class="guess-image" />
        } @else {
          <span class="image-loading">Loading image…</span>
        }
      </div>
      <div class="input-wrap">
        <input
          class="guess-input"
          type="text"
          [readOnly]="submitted()"
          [value]="guessText()"
          (input)="guessText.set($any($event.target).value)"
          placeholder="What do you see?"
        />
        @if (submitted()) {
          <div class="submitted-overlay">
            <span>Submitted</span>
          </div>
        }
      </div>
      <div class="card-footer">
        <span class="counter" [class.counter--done]="submitted()">
          <span class="counter-text"><strong>{{ submittedCount }}</strong> / {{ totalCount }} ready</span>
        </span>
        @if (submitted()) {
          <span class="waiting-label">Waiting for others…</span>
        } @else {
          <button
            type="button"
            class="btn-cta btn-cta--urgent"
            [disabled]="guessText().trim().length === 0"
            (click)="onSubmit()"
          >
            <img src="app-icons/promptle-check-light.svg" class="btn-icon btn-icon--check" alt="" />
            READY
          </button>
        }
      </div>
    </div>
