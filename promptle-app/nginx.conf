server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.csr.html;

    # SPA — fall back to index.csr.html for client-side routes.
    # no-cache: index.csr.html and the verbatim public/ assets (e.g. /app-icons, /player-icons)
    # are NOT content-hashed, so their URLs are stable across deploys. Forcing revalidation
    # (cheap ETag 304s when unchanged) means a redeploy with changed artwork takes effect
    # immediately instead of serving a stale browser-cached copy.
    location / {
        try_files $uri $uri/ /index.csr.html;
        add_header Cache-Control "no-cache";
    }

    # REST API → backend
    location /api/ {
        proxy_pass http://backend:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # STOMP over WebSocket → backend
    location /ws {
        proxy_pass http://backend:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
