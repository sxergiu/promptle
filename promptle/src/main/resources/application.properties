spring.application.name=promptle
server.port=8088

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

game.timer.prompting-seconds=20
game.timer.guessing-seconds=20

image.generation.provider=comfyui
image.generation.comfyui.url=http://localhost:8188
image.generation.comfyui.workflow=workflows/proto-t2i.json
image.generation.comfyui.prompt-node-id=6
image.generation.comfyui.output-node-id=9

# img2img workflow (round 2+)
image.generation.comfyui.img2img-workflow=workflows/proto-i2i.json
image.generation.comfyui.img2img-prompt-node-id=8
image.generation.comfyui.img2img-output-node-id=4
image.generation.comfyui.img2img-load-image-node-id=10
image.generation.comfyui.img2img-denoise=0.55

image.storage.provider=local
image.storage.local.path=/tmp/promptle

game.timer.generating-timeout-seconds=300

# Export
export.gif.width=540
export.gif.height=675
export.gif.text-frame-duration=4
export.gif.image-frame-duration=3
export.gif.title-frame-duration=3
export.gif.outro-frame-duration=3
export.gif.ffmpeg-path=ffmpeg
