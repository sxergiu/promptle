spring.application.name=promptle
server.port=8088

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

game.timer.prompting-seconds=60
game.timer.guessing-seconds=60

image.generation.provider=comfyui
# How rounds 2+ are generated — two equal alternatives (round 1 is always text-to-image):
#   image-to-image = seed each image from the previous one (visual lineage)
#   text-to-image  = generate each round fresh from the guess text (faithful to every
#                    prompt change, incl. removals; no visual carry-over)
# See promptle-docs/fine-tune/cfg-denoise-style-discussion.md.
image.generation.chain-mode=text-to-image
image.generation.comfyui.url=http://localhost:8188
image.generation.comfyui.workflow=workflows/proto-t2i.json
image.generation.comfyui.prompt-node-id=6
image.generation.comfyui.output-node-id=9
# CFG = how strictly the model obeys the prompt. 8 favors strong prompt adherence
# (chosen for text-to-image mode, where faithful rendering of each guess matters
# more than a softer look). Don't lower to fix style dominance — use image.style.weight.
image.generation.comfyui.cfg=8

# img2img workflow (round 2+)
image.generation.comfyui.img2img-workflow=workflows/proto-i2i.json
image.generation.comfyui.img2img-prompt-node-id=8
image.generation.comfyui.img2img-output-node-id=4
image.generation.comfyui.img2img-load-image-node-id=10
# denoise = how much the previous image may be repainted. 0.72 gives enough headroom
# for subtractive prompt changes (e.g. dropping a hat) while keeping visual lineage.
image.generation.comfyui.img2img-denoise=0.72
image.generation.comfyui.img2img-cfg=7
# Per-image poll cap (seconds). ComfyUI generates serially and all images in a round start
# polling at once, so this must exceed the worst-case TOTAL round generation time.
image.generation.comfyui.poll-timeout-seconds=600

image.storage.provider=local
image.storage.local.path=/tmp/promptle

# Attention weight on the art-style text appended to each prompt. Below 1.0 so the
# style shapes the look without crowding out the player's content. See promptle-docs/fine-tune.
image.style.weight.first-round=0.6
image.style.weight.later-rounds=0.6

# Round-level GENERATING backstop — must be >= poll-timeout so per-image polling resolves first.
game.timer.generating-timeout-seconds=700

# Export
# Frames are rendered at 2x (1080x1350) and downscaled to output-width for crisp text/edges.
export.gif.width=1080
export.gif.height=1350
export.gif.output-width=540
# Per-frame on-screen display time (seconds). Crossfades add transition-duration of overlap.
# Higher fps x more steps grows the GIF, so keep durations modest.
export.gif.text-frame-duration=2.2
export.gif.image-frame-duration=2.2
export.gif.title-frame-duration=1.8
export.gif.outro-frame-duration=2.0
export.gif.transition-duration=0.45
export.gif.fps=20
export.gif.ffmpeg-path=ffmpeg
